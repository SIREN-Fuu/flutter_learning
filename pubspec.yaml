name: flutter_learning
description: A new Flutter project.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  collection: ^1.17.2
  cupertino_icons: ^1.0.8
  dartx: ^1.2.0
  device_preview: ^1.1.0
  fl_chart: ^0.67.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.20.5
  flutter_localizations: # 多言語
    sdk: flutter
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  go_router: ^14.0.0
  google_generative_ai: ^0.3.1
  hooks_riverpod: ^2.5.1
  intl: ^0.18.1
  logger: ^2.2.0
  path: ^1.8.3
  path_provider: ^2.1.3
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.9
  custom_lint: ^0.6.4
  flutter_lints: ^3.0.2
  flutter_test:
    sdk: flutter
  freezed: ^2.5.2
  go_router_builder: ^2.5.1
  json_serializable: ^6.8.0
  pedantic_mono: ^1.26.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10

flutter:
  generate: true # gen-l10n コマンドを有効化
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/OFL.txt
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Bold.otf
        - asset: assets/fonts/NotoSansJP-Regular.otf

name: flutter_learning
description: A new Flutter project.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  collection: ^1.17.2
  dartx: ^1.2.0
  device_preview: ^1.1.0
  fl_chart: ^0.65.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.20.1
  flutter_riverpod: ^2.4.9
  freezed_annotation: ^2.4.1
  go_router: ^12.1.1
  hooks_riverpod: ^2.4.9
  intl: ^0.18.1
  logger: ^2.0.2+1
  path: ^1.8.3
  path_provider: ^2.1.1
  riverpod_annotation: ^2.3.3
  shared_preferences: ^2.2.2
  uuid: ^4.2.2

dev_dependencies:
  build_runner: ^2.4.6
  custom_lint: ^0.5.7
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  freezed: ^2.4.1
  go_router_builder: ^2.3.4
  json_serializable: ^6.7.1
  pedantic_mono: ^1.25.0
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/OFL.txt
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Bold.otf
        - asset: assets/fonts/NotoSansJP-Regular.otf
